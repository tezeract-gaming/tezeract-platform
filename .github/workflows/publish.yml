name: Publish SDK

# Fires on tag push (e.g. `git tag v0.1.0 && git push --tags`).
# Builds sdk-motion AAR + sources jar and pushes them to
# GitHub Packages at maven.pkg.github.com/tezeract-gaming/tezeract-platform.
#
# Consumers (the private launcher, third-party game devs) then add:
#   maven { url = "https://maven.pkg.github.com/tezeract-gaming/tezeract-platform" }
#   implementation("com.tezeract:sdk-motion:0.1.0")

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Manual version override (e.g. 0.1.0-rc.1)"
        required: false

jobs:
  publish:
    name: Publish sdk-motion to GitHub Packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $v"

      - name: Publish to GitHub Packages
        run: ./gradlew :sdk-motion:publish -PsdkVersion=${{ steps.ver.outputs.version }} --no-daemon --stacktrace
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
